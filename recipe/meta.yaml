{% set name = "plothist-utils" %}
{% set version = "0.0.3" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/plothist_utils-{{ version }}.tar.gz
  sha256: 1547ce247ebec3937fb99b54a184fc4fcbfa2ce36dac87d83ea4d768d9d43783

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - numpy >=1.14.5

test:
  imports:
    - plothist_utils
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/8-hat/plothist-utils
  summary: Utilities for the plothist package
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - 0ctagon
